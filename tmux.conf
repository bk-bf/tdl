# tdl/tmux.conf — sourced by ~/.config/tmux/.tmux.conf
# All treemux plugin config lives here. Pane sizes live in aliases.sh (tdl function).

# Treemux sidebar toggle keybind
bind Tab run-shell "~/.config/tmux/plugins/treemux/scripts/toggle.sh '' ''"

# Treemux plugin options
set -g @treemux-tree-client      'nvim-tree'
set -g @treemux-tree-nvim-init-file '~/.config/nvim-treemux/treemux_init.lua'
set -g @treemux-nvim-command     'NVIM_APPNAME=nvim-treemux nvim'
# Use absolute python path (pynvim required: sudo pacman -S python-pynvim)
set -g @treemux-python-command   '/usr/bin/python3'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kiyoon/treemux'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

run '~/.config/tmux/plugins/tpm/tpm'
run '~/.config/tmux/plugins/treemux/sidebar.tmux'

# Auto-open sidebar on new session
set-hook -g session-created "run-shell '~/.config/tmux/ensure_treemux.sh'"
