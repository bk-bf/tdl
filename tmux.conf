# aid/tmux.conf — complete tmux configuration for the aid IDE environment.
# Loaded exclusively via: tmux -L tdl -f <path>/aid/tmux.conf
# Never sourced into the user's existing tmux setup.

# ── Terminal ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g aggressive-resize off
# Reduce escape-sequence processing delay — shrinks visible flicker window
set -sg escape-time 0
# Forward synchronized-output protocol (Kitty supports it): batches redraws atomically
set -as terminal-features ",*:sync"
set -g focus-events on
set -g history-limit 2000

# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-b

# ── Status bar ───────────────────────────────────────────────────────────────
# vim-tpipeline overwrites status-left/right when an nvim pane is active.
# These values are the fallback shown when no nvim pane has focus.
set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-interval 1
set -g status-style "bg=#6181C6 fg=#ffffff"
set -g status-left-length 90
set -g status-right-length 90

set -g status-left  "#[fg=#000000,bg=#b57bee,bold] #S #[fg=#b57bee,bg=#6181C6,none]  "
set -g status-right "#[fg=#A284C6,bg=#6181C6]#[fg=#ffffff,bg=#A284C6] %H:%M #[fg=#b57bee,bg=#A284C6]#[fg=#000000,bg=#b57bee,bold] #{?client_prefix,PREFIX,#h} "

set -g window-status-style          ""
set -g window-status-format         ""
set -g window-status-current-format ""

# ── Keybinds ─────────────────────────────────────────────────────────────────
# Reload this config (aid server only)
bind r run-shell 'tmux source-file "$(tmux show-environment -g TDL_DIR | cut -d= -f2-)/tmux.conf" && tmux display-message "aid tmux config reloaded"'

# Pane splitting (no prefix)
bind-key -n M-v split-window -h -c "#{pane_current_path}"
bind-key -n M-h split-window -v -c "#{pane_current_path}"
bind-key -n M-q kill-pane
bind-key -n M-S-q detach-client

# Pane navigation (no prefix)
set -g mouse on
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D
bind-key -n C-h     select-pane -L
bind-key -n C-l     select-pane -R
bind-key -n C-k     select-pane -U
bind-key -n C-j     select-pane -D

# ── Treemux sidebar ──────────────────────────────────────────────────────────
# Treemux sidebar toggle keybind
bind Tab run-shell "~/.config/tmux/plugins/treemux/scripts/toggle.sh '' ''"

# Treemux plugin options
set -g @treemux-tree-width           21
set -g @treemux-tree-client          'nvim-tree'
set -g @treemux-tree-nvim-init-file  '~/.config/nvim-treemux/treemux_init.lua'
set -g @treemux-nvim-command         'NVIM_APPNAME=nvim-treemux nvim'
# Use absolute python path (pynvim required: sudo pacman -S python-pynvim)
set -g @treemux-python-command       '/usr/bin/python3'

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kiyoon/treemux'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

run '~/.config/tmux/plugins/tpm/tpm'
run '~/.config/tmux/plugins/treemux/sidebar.tmux'
