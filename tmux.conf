# aid/tmux.conf — complete tmux configuration for the aid IDE environment.
# See docs/ARCHITECTURE.md for isolation and usage details.

# ── Terminal ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g aggressive-resize off
# Reduce escape-sequence processing delay — shrinks visible flicker window
set -sg escape-time 0
# Forward synchronized-output protocol (Kitty supports it): batches redraws atomically
set -as terminal-features ",*:sync"
set -g focus-events on
set -g history-limit 2000

# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-b

# ── Status bar ───────────────────────────────────────────────────────────────
# vim-tpipeline overwrites status-left/right when an nvim pane is active.
# Colors are defined in nvim/lua/palette.lua and written to tmux/palette.conf
# by gen-tmux-palette.sh at session start (called from aid.sh).
set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-interval 1
# palette.conf is sourced by aid.sh after the server starts (source-file does
# not expand #{E:...} format strings in its path argument — tmux limitation).
# Colours default to plain until aid.sh applies them ~immediately after start.

# ── Keybinds ─────────────────────────────────────────────────────────────────
# Reload this config (aid server only)
bind r run-shell 'D=$(tmux show-environment -g AID_DIR | cut -d= -f2-) && DA=$(tmux show-environment -g AID_DATA | cut -d= -f2-) && tmux source-file "$D/tmux.conf" && tmux source-file "$DA/tmux/palette.conf" && tmux display-message "aid tmux config reloaded"'

set -g mouse on

# ── Pane navigation ───────────────────────────────────────────────────────────
# Arrow keys (no prefix) — works in all panes including opencode and treemux.
# These binds are validated against aid's three-pane layout.
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D

# Vim-style navigation (C-h/j/k/l, no prefix).
# aid's nvim config loads tmux.nvim which intercepts these inside nvim and passes
# them back to tmux when there is no nvim split in that direction — so they work
# seamlessly across the tmux/nvim boundary without any extra setup.
bind-key -n C-h select-pane -L
bind-key -n C-l select-pane -R
bind-key -n C-k select-pane -U
bind-key -n C-j select-pane -D

# ── Pane management ───────────────────────────────────────────────────────────
# These defaults are opinionated but validated for aid's workflow.
# Remove or rebind if they conflict with your terminal emulator.
bind-key -n M-v   split-window -h -c "#{pane_current_path}"
bind-key -n M-h   split-window -v -c "#{pane_current_path}"
unbind-key -n M-S-q
bind-key -n M-q   confirm-before -p "kill session #{session_name}? (y/n)" kill-session
bind-key -n M-Q   detach-client

# ── Buffer reload hook ───────────────────────────────────────────────────────
# Push a full sync into the nvim socket whenever any pane gains focus.
# This ensures buffers edited externally (e.g. by opencode) are reloaded in nvim
# and gitsigns line-change highlights are updated without waiting for the user to
# physically focus the nvim pane (T-014/BUG-009).
# sync.sync() runs checktime + gs.refresh() + nvim-tree reload — same as FocusGained.
# pane-focus-in fires at the same rate as FocusGained so the flicker risk is identical.
# AID_NVIM_SOCKET is set in the tmux server environment by aid.sh at session start.
# The || true suppresses errors when the socket does not exist yet (e.g. during startup).
set-hook -g pane-focus-in \
  "run-shell -b 'nvim --server \"#{E:AID_NVIM_SOCKET}\" --remote-send \"<cmd>lua require(\\\"sync\\\").sync()<cr>\" 2>/dev/null || true'"

# ── Treemux sidebar ──────────────────────────────────────────────────────────
# Treemux sidebar toggle keybind
# #{E:TMUX_PLUGIN_MANAGER_PATH} expands the tmux server env var at runtime (set by aid.sh).
bind Tab run-shell "#{E:TMUX_PLUGIN_MANAGER_PATH}treemux/scripts/toggle.sh '#{E:@treemux-key-Tab}' '#{pane_id}'"

# ── Orchestrator session navigator ───────────────────────────────────────────
# prefix+s — open the aid-sessions popup navigator (works from any aid session).
# -E closes the popup automatically when aid-sessions exits.
# AID_DIR is set in the tmux server environment by aid.sh / orchestrator.sh;
# #{E:AID_DIR} expands it at bind execution time.
bind s display-popup -E -w 30% -h 90% "AID_DIR=#{E:AID_DIR} AID_DATA=#{E:AID_DATA} AID_CONFIG=#{E:AID_CONFIG} TMUX=#{E:TMUX} #{E:AID_DIR}/lib/sessions/aid-sessions"

# Treemux plugin options (read by sidebar.tmux when TPM sources it)
set -g @treemux-tree-width           26
set -g @treemux-tree-client          'nvim-tree'
set -g @treemux-tree-nvim-init-file  "#{E:AID_CONFIG}/treemux/treemux_init.lua"
set -g @treemux-nvim-command         "XDG_CONFIG_HOME=#{E:AID_CONFIG} NVIM_APPNAME=treemux nvim"
# Use absolute python path (pynvim required: sudo pacman -S python-pynvim)
set -g @treemux-python-command       '/usr/bin/python3'

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kiyoon/treemux'

# TMUX_PLUGIN_MANAGER_PATH is injected into the server environment by aid.sh
# (and install.sh) before this file is sourced — TPM reads it to find plugins.
# TPM's source_plugins() calls all *.tmux files including treemux/sidebar.tmux;
# there is no need (and it is harmful) to run sidebar.tmux explicitly here.
run '#{E:TMUX_PLUGIN_MANAGER_PATH}tpm/tpm'
